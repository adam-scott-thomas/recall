<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recall — Settings</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f5;
      --text: #1a1a1a;
      --text-secondary: #666666;
      --border: #e0e0e0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #059669;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e;
        --bg-secondary: #16213e;
        --text: #e0e0e0;
        --text-secondary: #a0a0a0;
        --border: #2a2a4a;
        --accent: #60a5fa;
        --accent-hover: #3b82f6;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --success: #34d399;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      max-width: 640px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 { font-size: 24px; margin-bottom: 4px; }
    .subtitle { color: var(--text-secondary); margin-bottom: 24px; }

    section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    section h2 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }

    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(37, 99, 235, 0.05);
    }

    .drop-zone p { color: var(--text-secondary); margin-bottom: 8px; }

    input[type="file"] { display: none; }

    .btn {
      display: inline-block;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: var(--danger-hover); }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    #import-status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }

    #import-status.success { display: block; background: rgba(5, 150, 105, 0.1); color: var(--success); }
    #import-status.error { display: block; background: rgba(220, 38, 38, 0.1); color: var(--danger); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      padding: 12px;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text-secondary); }

    .actions { display: flex; gap: 8px; }

    .confirm-dialog {
      display: none;
      padding: 12px;
      background: rgba(220, 38, 38, 0.05);
      border: 1px solid var(--danger);
      border-radius: 6px;
      margin-top: 12px;
    }

    .confirm-dialog.visible { display: block; }
    .confirm-dialog p { margin-bottom: 8px; }

    .about { font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 16px; }
    .about a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <h1>Recall</h1>
  <p class="subtitle">Search your AI conversation history. Fully local.</p>

  <section>
    <h2>Import Conversations</h2>
    <div class="drop-zone" id="drop-zone">
      <p>Drop your ChatGPT or Claude export file here</p>
      <p>or</p>
      <button class="btn btn-primary" id="choose-file">Choose File</button>
      <input type="file" id="file-input" accept=".json,.jsonl" multiple>
    </div>
    <div id="import-status"></div>
  </section>

  <section>
    <h2>Your Data</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="conv-count">—</div>
        <div class="stat-label">Conversations</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="msg-count">—</div>
        <div class="stat-label">Messages</div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary" id="export-btn">Export All Data</button>
      <button class="btn btn-danger" id="delete-btn">Delete All Data</button>
    </div>
    <div class="confirm-dialog" id="confirm-delete">
      <p><strong>This will permanently delete all indexed conversations.</strong> This cannot be undone.</p>
      <div class="actions">
        <button class="btn btn-danger" id="confirm-yes">Yes, Delete Everything</button>
        <button class="btn btn-secondary" id="confirm-no">Cancel</button>
      </div>
    </div>
  </section>

  <div class="about">
    Recall v0.1.0 — MIT License — <a href="https://github.com/ghostlogic/recall" target="_blank">GitHub</a> — <a href="../docs/SECURITY.md" target="_blank">Security</a>
  </div>

  <script src="options.js" type="module"></script>
</body>
</html>
