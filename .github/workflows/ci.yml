name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  manifest:
    name: Manifest sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest.json is valid JSON and MV3
        run: |
          node -e "
            const m = require('./manifest.json');
            if (m.manifest_version !== 3) { console.error('manifest_version must be 3'); process.exit(1); }
            if (!m.name || !m.version || !m.description) { console.error('name/version/description required'); process.exit(1); }
            for (const p of (m.permissions || [])) {
              if (!['storage'].includes(p)) {
                console.error('Unexpected permission: ' + p + ' (Recall must stay storage-only)');
                process.exit(1);
              }
            }
            for (const k of ['host_permissions','content_scripts','externally_connectable']) {
              if (m[k]) { console.error('Unexpected key for storage-only extension: ' + k); process.exit(1); }
            }
            console.log('manifest.json OK (MV3, storage-only, no host permissions)');
          "
      - name: Verify version matches package.json
        run: |
          node -e "
            const m = require('./manifest.json');
            const p = require('./package.json');
            if (m.version !== p.version) {
              console.error('Version mismatch: manifest=' + m.version + ' package=' + p.version);
              process.exit(1);
            }
            console.log('Versions match: ' + m.version);
          "

  package:
    name: Build store package
    runs-on: ubuntu-latest
    needs: [test, manifest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build zip
        run: bash scripts/package.sh
      - uses: actions/upload-artifact@v4
        with:
          name: recall-extension
          path: |
            *.zip
            dist/*.zip
          if-no-files-found: warn
          retention-days: 30
